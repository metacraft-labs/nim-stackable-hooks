name: CI

on:
  push:
    branches: [main, dev, stable, io-mon-fixes]
  pull_request:
    branches: [main, dev, stable]

env:
  MANIFESTS_REF: io-mon-fixes

jobs:
  lint:
    name: Lint
    runs-on: incus
    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dev Environment
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: nix
          gh-token: ${{ steps.app-token.outputs.token }}

      - name: Run lint
        run: dev-exec just lint 2>&1 | tee lint.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-logs
          path: lint.log
          retention-days: 30

  build:
    name: Build
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on: [incus, macos-tart]
    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dev Environment
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: nix
          gh-token: ${{ steps.app-token.outputs.token }}

      - name: Run build
        run: dev-exec just build 2>&1 | tee build.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.runs-on }}
          path: build.log
          retention-days: 30

  test:
    name: Test
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: nix
            runs-on: incus
          - env: nix
            runs-on: macos-tart
          - env: reprobuild
            runs-on: incus
    steps:
      - name: Generate CI token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_TOKEN_PROVIDER_APP_ID }}
          private-key: ${{ secrets.CI_TOKEN_PROVIDER_PRIVATE_KEY }}
          owner: metacraft-labs

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dev Environment
        uses: metacraft-labs/metacraft-github-actions/setup-dev-env@main
        with:
          env-flavor: ${{ matrix.env }}
          gh-token: ${{ steps.app-token.outputs.token }}

      - name: Run tests
        run: |
          if [ "${{ matrix.env }}" = "reprobuild" ]; then
            repro test 2>&1 | tee test.log
          else
            dev-exec just test 2>&1 | tee test.log
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.runs-on }}-${{ matrix.env }}
          path: test.log
          retention-days: 30
