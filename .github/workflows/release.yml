name: Release

on:
  push:
    tags:
      - 'v*'

env:
  MANIFESTS_REF: io-mon-fixes

jobs:
  build:
    name: Package Library Archive
    runs-on: eph-linux-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/nim-stackable-hooks-${{ github.ref_name }}.tar.gz --exclude='.git' --exclude='.github' --exclude='dist' .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          retention-days: 7

  release:
    name: Publish Github Release
    needs: build
    runs-on: eph-linux-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
